<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Hybrid Pinball (Canvas2D + WebGL Atlas)</title>
    <style>
      :root { color-scheme: light; }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }
      body {
        margin: 0;
        box-sizing: border-box;
        padding:
          max(8px, env(safe-area-inset-top))
          max(8px, env(safe-area-inset-right))
          max(8px, env(safe-area-inset-bottom))
          max(8px, env(safe-area-inset-left));
        background-color: #f17455;
        background-image:
          radial-gradient(circle at 28% 18%, rgba(255, 247, 174, .90), transparent 18vw),
          radial-gradient(circle at 74% 12%, rgba(113, 222, 255, .58), transparent 22vw),
          radial-gradient(circle at 50% 92%, rgba(91, 73, 202, .42), transparent 34vw),
          linear-gradient(135deg, rgba(255,255,255,.16) 0 10px, transparent 10px 28px),
          linear-gradient(180deg, #ffcf68 0%, #fb7958 48%, #6246b9 100%);
        background-size: auto, auto, auto, 38px 38px, auto;
        display: grid;
        place-items: center;
        min-height: 100svh;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #wrap {
        position: relative;
        width: min(94vw, calc((100svh - 24px) * 0.625), 520px);
        aspect-ratio: 10 / 16;
        overflow: hidden;
        background: #1a2130;
        border: 8px solid #fff0ba;
        border-radius: 22px;
        box-shadow:
          0 0 0 4px #202336,
          0 0 0 9px #ff5d66,
          0 22px 0 rgba(70, 43, 74, .34),
          0 36px 76px rgba(48, 29, 75, .48),
          inset 0 0 0 4px rgba(255,255,255,.42);
      }
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; image-rendering: auto; }
      #gl { z-index: 1; }
      #ui { z-index: 2; pointer-events: auto; touch-action: none; }
      @media (max-width: 560px) {
        body { padding: max(4px, env(safe-area-inset-top)) max(4px, env(safe-area-inset-right)) max(4px, env(safe-area-inset-bottom)) max(4px, env(safe-area-inset-left)); }
        #wrap {
          width: min(100vw, calc((100svh - 8px) * 0.625));
          border-width: 4px;
          box-shadow:
            0 0 0 2px #202336,
            0 0 0 5px #ff5d66,
            0 12px 0 rgba(70, 43, 74, .34),
            0 22px 44px rgba(48, 29, 75, .42),
            inset 0 0 0 3px rgba(255,255,255,.42);
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-BTUTZt7M.js"></script>
  </head>
  <body>
    <div id="wrap">
      <canvas id="gl"></canvas>
      <canvas id="ui"></canvas>
    </div>
  </body>
</html>
