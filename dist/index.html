<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Hybrid Pinball (Canvas2D + WebGL Atlas)</title>
    <style>
      :root { color-scheme: light; }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }
      body {
        margin: 0;
        box-sizing: border-box;
        padding:
          max(8px, env(safe-area-inset-top))
          max(8px, env(safe-area-inset-right))
          max(8px, env(safe-area-inset-bottom))
          max(8px, env(safe-area-inset-left));
        background-color: #0876b9;
        background-image:
          linear-gradient(rgba(255, 255, 255, .08) 2px, transparent 2px),
          linear-gradient(90deg, rgba(255, 255, 255, .08) 2px, transparent 2px),
          radial-gradient(circle at 50% 20%, rgba(104, 228, 255, .42), transparent 36vw),
          linear-gradient(180deg, #16a8df, #0767a8 68%, #034b82);
        background-size: 32px 32px, 32px 32px, auto, auto;
        display: grid;
        place-items: center;
        min-height: 100svh;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #wrap {
        position: relative;
        width: min(94vw, calc((100svh - 24px) * 0.625), 520px);
        aspect-ratio: 10 / 16;
        overflow: hidden;
        background: #123452;
        border: 8px solid #f8deb0;
        border-radius: 0;
        box-shadow:
          0 0 0 4px #123452,
          0 0 0 8px #176aa3,
          0 24px 0 rgba(4, 25, 42, .30),
          0 34px 72px rgba(2, 25, 45, .44),
          inset 0 0 0 4px #fff5cf;
      }
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; image-rendering: auto; }
      #gl { z-index: 1; }
      #ui { z-index: 2; pointer-events: auto; touch-action: none; }
      @media (max-width: 560px) {
        body { padding: max(4px, env(safe-area-inset-top)) max(4px, env(safe-area-inset-right)) max(4px, env(safe-area-inset-bottom)) max(4px, env(safe-area-inset-left)); }
        #wrap {
          width: min(100vw, calc((100svh - 8px) * 0.625));
          border-width: 4px;
          box-shadow:
            0 0 0 2px #123452,
            0 0 0 4px #176aa3,
            0 12px 0 rgba(4, 25, 42, .30),
            0 22px 44px rgba(2, 25, 45, .40),
            inset 0 0 0 3px #fff5cf;
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-El7r4FxW.js"></script>
  </head>
  <body>
    <div id="wrap">
      <canvas id="gl"></canvas>
      <canvas id="ui"></canvas>
    </div>
  </body>
</html>
