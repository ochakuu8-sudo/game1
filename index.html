<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hybrid Pinball (Canvas2D + WebGL Atlas)</title>
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #0b1020; display: grid; place-items: center; min-height: 100vh; font-family: system-ui, sans-serif; }
      #wrap { position: relative; width: min(92vw, 520px); aspect-ratio: 10 / 16; border: 1px solid #2f3a67; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
      canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
      #gl { z-index: 1; }
      #ui { z-index: 2; pointer-events: none; }
      #hint { position: fixed; bottom: 12px; color: #adb7ff; opacity: .9; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="gl"></canvas>
      <canvas id="ui"></canvas>
    </div>
    <div id="hint">←/→ or A/D でフリッパー。Space で打ち出し。</div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
